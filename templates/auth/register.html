{% extends 'auth_layout.html' %}

{% block title %}
    Register
{% endblock %}

{% block body %}
    <form action="/register" method="post">
        <div class="mb-3">
            <input autocomplete="off" autofocus class="form-control mx-auto w-auto" name="username" placeholder="Username" type="text"></input>
        </div>
        <div class="mb-3">
            <input class="form-control mx-auto w-auto" name="email" placeholder="Email" type="text"></input>
        </div>
        <div class="mb-3">
            <input class="form-control mx-auto w-auto" name="password" placeholder="Password" type="password"></input>
        </div>
        <div class="mb-3">
            <input class="form-control mx-auto w-auto" name="confirmation" placeholder="Confirm Password" type="password"></input>
        </div>
        <button class="btn btn-primary" type="submit">Register</button>
    </form>

    <p>
        Already have an account?
        <a href="/login">Login Here</a>
    </p>
{% endblock %}
