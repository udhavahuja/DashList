{% extends 'layout.html' %}

{% block title %}
    Library - Edit
{% endblock %}

{% block body %}
    <div class="card h-100">
        <img src="{{ item.cover_url }}" alt="{{ item.title }}" class="card-img-top">

        <div class="card-body">
            <h5 class="card-title"> {{ item.title }} </h5>
            <p class="card-text">
                {{ item.type | capitalize }}
            </p>
            {% if item.type == "book" %}
                <p class="card-text">
                    {{ item.authors }}
                </p>
            {% endif %}
            <p class="card-text">
                {{ item.release_year }}
            </p>
            <p class="card-text"> {{ item.description }} </p>

            <form method="post" action="/library/edit">

                <!-- Status -->
                <select name="status" id="status">Status:
                    <option value="planned" {% if item.status == "planned" %}selected{% endif %}>Planned</option>
                    <option value="ongoing" {% if item.status == "ongoing" %}selected{% endif %}>Ongoing</option>
                    <option value="completed" {% if item.status == "completed" %}selected{% endif %}>Completed</option>
                    <option value="dumped" {% if item.status == "dumped" %}selected{% endif %}>Dumped</option>
                </select>

                <!-- Rating -->
                <!-- <div class="rating">
                    <span class="star" data-value="1">&#9733;</span>
                    <span class="star" data-value="2">&#9733;</span>
                    <span class="star" data-value="3">&#9733;</span>
                    <span class="star" data-value="4">&#9733;</span>
                    <span class="star" data-value="5">&#9733;</span>

                    <input type="hidden" name="rating" id="rating" value="{{ item.rating }}">
                </div> -->
                <select name="rating" id="rating">Rate:
                    <option value="">To Rate</option>
                    <option value="1" {% if item.rating == 1 %}selected{% endif %}>1</option>
                    <option value="2" {% if item.rating == 2 %}selected{% endif %}>2</option>
                    <option value="3" {% if item.rating == 3 %}selected{% endif %}>3</option>
                    <option value="4" {% if item.rating == 4 %}selected{% endif %}>4</option>
                    <option value="5" {% if item.rating == 5 %}selected{% endif %}>5</option>
                </select>
                <input type="hidden" name="api_id" value="{{ item.api_id }}">
                <input type="hidden" name="source" value="{{ item.source }}">
                <button class="btn btn-primary w-100" type="submit">
                    Save
                </button>
            </form>
        </div>
        <form action="/library">
            <button class="btn btn-primary w-100">
                Cancel
            </button>
        </form>
    
    </div>
{% endblock %}
