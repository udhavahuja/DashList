{% block stat_card %}

            <div class="stat-header">
                <i class="bi {{ icon }}"></i>
            <span class="stat-title">{{ title }}</span>
            </div>
            <h2 class="stat-vlaue">{{ value }}</h2>
        </div>
    </div>
{% endblock %}
