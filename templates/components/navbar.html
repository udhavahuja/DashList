{% block nav %}
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <div class="logo">
                <a href="/">
                    <img src="static/images/DashList_logo.png" alt="Dashlist logo" id="logo">
                </a>
            </div>
            <div class="options">
                <ul>
                    <li>
                        <a href="/" class="nav-link {% if request.endpoint == 'dashboard.dashboard' %}active{% endif %}">Dashboard</a>
                    </li>
                    <li>
                        <a href="/browse" class="nav-link {% if request.endpoint == 'browse.browse' %}active{% endif %}">Browse</a>
                    </li>
                    <li>
                        <a href="/library" class="nav-link {% if request.endpoint == 'library.library' %}active{% endif %}">Library</a>
                    </li>
                    <li>
                        <form action="{{ url_for('auth_bp.logout') }}" method="POST">
                            <button type="submit" class="logoutBtn">Logout</button>
                        </form>
                    </li>
                    <li>
                        <button id="theme-toggle" class="theme-btn" aria-label="Toggle Theme">
                            <i class="bi bi-moon-fill" id="theme-icon"></i>
                        </button>
                    </li>
                    <li>

                    </li>
                </ul>
            </div>
        </div>
    </nav>
{% endblock %}
